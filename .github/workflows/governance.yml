name: Governance

on:
  push:
    branches:
      - main
      - jakob-be
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate policies against schemas
        run: python scripts/governance_validate.py

      - name: Verify .cursor/rules mirrors are in sync
        run: python scripts/rules_sync.py --check

      - name: Check term coverage (strict)
        run: python scripts/check_term_coverage.py --strict

      - name: Check platform version baseline (drift)
        run: python scripts/check_platform_baseline.py --check

      - name: Sprintvakt check
        run: |
          pip install -e .
          python scripts/sprintvakt_check.py --strict

      - name: Run pytest
        run: python -m pytest tests/ -v

  eval-baseline:
    # Node-free product-quality regression gate. Kept in its own job (not
    # folded into governance) so a quality regression shows as a distinct PR
    # check, runs in parallel with the policy guards, and stays cheap: it uses
    # the deterministic golden-path mode (no OPENAI_API_KEY, no npm build).
    # The npm-heavy lanes (full suite + next build) live in builder-smoke.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Eval-baseline regression gate (deterministic golden path)
        run: python scripts/eval_gate.py

      - name: Mini-eval no-LLM follow-up gate
        run: python scripts/mini_eval.py --evals-dir "$RUNNER_TEMP/sajtbyggaren-mini-eval"

  builder-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: data/starters/marketing-base/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build smoke site end-to-end
        run: |
          python scripts/build_site.py --dossier examples/painter-palma.project-input.json --generated-dir "$RUNNER_TEMP/sajtbyggaren-output/.generated"

  ai-bug-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI bug review
        run: python scripts/ai_bug_review.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_REVIEW_MODEL: ${{ vars.OPENAI_REVIEW_MODEL || 'gpt-5.5' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
