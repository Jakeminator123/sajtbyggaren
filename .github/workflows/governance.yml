name: Governance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate policies against schemas
        run: python scripts/governance_validate.py

      - name: Verify .cursor/rules mirrors are in sync
        run: python scripts/rules_sync.py --check

      - name: Check term coverage (strict)
        run: python scripts/check_term_coverage.py --strict

      - name: Run pytest
        run: python -m pytest tests/ -v
