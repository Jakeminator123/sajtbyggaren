name: Governance

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  governance:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate policies against schemas
        run: python scripts/governance_validate.py

      - name: Verify .cursor/rules mirrors are in sync
        run: python scripts/rules_sync.py --check

      - name: Check term coverage (strict)
        run: python scripts/check_term_coverage.py --strict

      - name: Sprintvakt check
        run: |
          pip install -e .
          python scripts/sprintvakt_check.py --strict

      - name: Run pytest
        run: python -m pytest tests/ -v

      - name: Run AI bug review
        if: always()
        run: python scripts/ai_bug_review.py
        env:
          OPENAI_REVIEW_MODEL: ${{ vars.OPENAI_REVIEW_MODEL || 'gpt-5.4' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  builder-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: data/starters/marketing-base/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build smoke site end-to-end
        run: |
          python scripts/build_site.py --dossier examples/painter-palma.project-input.json --generated-dir "$RUNNER_TEMP/sajtbyggaren-output/.generated"
